kind = "mobile"
previewPath = "/"
title = "Waganyu Mobile"
version = "1.0.0"
id = "artifacts/waganyu-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20246

[services.development]
run = "pnpm --filter @workspace/waganyu-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/waganyu-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/waganyu-mobile", "run", "serve" ]

[services.env]
PORT = "20246"
BASE_PATH = "/"
